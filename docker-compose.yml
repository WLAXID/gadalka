# gadalka — paper trader + Telegram-панель.
#
# Один сервис (paper-trader), внутри запущены scheduler + tg-bot.
# Это упрощает graceful shutdown и общий state.
#
# Usage:
#   docker compose up -d --build     # собрать и запустить в фоне
#   docker compose logs -f           # смотреть логи
#   docker compose down              # остановить (данные в томе остаются)
#   docker compose restart           # перезапустить
#
# Перед первым запуском:
#   cp .env.example .env
#   # отредактировать .env, заполнить TG_BOT_TOKEN и TG_OWNER_ID

services:
  paper:
    build:
      context: .
      dockerfile: Dockerfile
    image: gadalka-paper:latest
    container_name: gadalka-paper
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      PAPER_DB_PATH: "/app/data/paper.duckdb"
      PAPER_BACKUP_DIR: "/app/data/backups"
      TZ: "UTC"
    volumes:
      # БД paper-трейдера — именованный том (переживает down/up/обновление)
      - gadalka-data:/app/data
      # Логи (если будем писать в файлы; пока в stdout)
      - gadalka-logs:/app/logs
    # Без портов наружу — это паблик не нужно, общается только с Telegram
    healthcheck:
      # read_only=True — иначе единственный writer-lock уже у paper-trader,
      # и healthcheck постоянно бы падал → Docker крутил бы рестарты.
      # SELECT FROM paper_trades — проверка реальной schema-integrity,
      # не просто файл открывается (corruption могла дропнуть таблицы).
      test: ["CMD", "python", "-c", "import duckdb; duckdb.connect('/app/data/paper.duckdb', read_only=True).execute('SELECT COUNT(*) FROM paper_trades LIMIT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3
      # 120s даёт время на ALTER TABLE миграции и recovery-from-backup
      # при первом запуске после обновления / corrupt'а.
      start_period: 120s
    # Log rotation: за месяц без присмотра stdout не должен сожрать диск.
    # 5 файлов × 10 МБ = max 50 МБ на контейнер.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  gadalka-data:
  gadalka-logs:
